<mat-toolbar class="app-toolbar">
  <a routerLink="/cocktails" class="app-toolbar__logo">Барная карта</a>
  <span class="app-toolbar__spacer"></span>

  @if (auth.isAuthenticated()) {
    <span class="app-toolbar__user">{{ auth.currentUser()?.email }}</span>
    <button mat-icon-button (click)="logout()" aria-label="Выйти">
      <mat-icon>logout</mat-icon>
    </button>
  }

  <button
    mat-icon-button
    (click)="toggleTheme()"
    [attr.aria-label]="theme.mode() === 'dark' ? 'Включить светлую тему' : 'Включить тёмную тему'"
  >
    <mat-icon>{{ theme.mode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>

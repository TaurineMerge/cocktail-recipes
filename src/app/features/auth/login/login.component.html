<mat-card class="auth-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" aria-label="Форма входа">
      <mat-form-field appearance="outline" class="full-width auth-card__form-field">
        <mat-icon matPrefix>email</mat-icon>
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <mat-error>Введите корректный email</mat-error>
        }
      </mat-form-field>

      <app-password-field [control]="form.controls.password" autocomplete="current-password" />

      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() }}</p>
      }

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="full-width auth-submit"
        [disabled]="isSubmitting()"
      >
        @if (isSubmitting()) {
          <mat-spinner diameter="20" />
        } @else {
          Войти
        }
      </button>
    </form>
  </mat-card-content>
</mat-card>

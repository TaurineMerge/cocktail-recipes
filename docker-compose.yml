services:
  backend:
    build:
      context: ./dev-server
    environment:
      NODE_ENV: production
      COOKIE_SECURE: 'false'
    env_file:
      - dev-server/.env
    ports:
      - '3000:3000'
    volumes:
      - cocktail-store:/app/store
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    build:
      context: .
    ports:
      - '4200:8080'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  cocktail-store:
